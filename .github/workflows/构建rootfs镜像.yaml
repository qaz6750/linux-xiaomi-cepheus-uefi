# 统一的系统镜像构建工作流 - 在 Ubuntu 24.04 ARM 上运行
name: 构建系统镜像

# 手动触发，可指定所有参数
on:
  workflow_dispatch:
    inputs:
      system_type:
        description: '系统类型'
        required: true
        default: 'ubuntu-gnome'
        type: choice
        options:
          - ubuntu-desktop
          - ubuntu-gnome
          - ubuntu-server
      kernel_version:
        description: '内核版本号 (从 Release 下载对应版本)'
        required: true
        default: '7.1'
      desktop_environment:
        description: 'Phosh 变体 (仅 ubuntu-desktop 生效)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - phosh-core
          - phosh-full
          - phosh-phone

# 工作流配置
jobs:
  build-system-image:
    # 在 Ubuntu 24.04 ARM 上运行
    runs-on: ubuntu-24.04-arm
    
    # 设置权限，允许创建 Release
    permissions:
      contents: write   # 允许创建 Release 和上传文件
      packages: write   # 允许上传包（如果需要）
    
    # 定义环境变量
    env:
      BUILD_TIMESTAMP: ${{ format('{0}', github.run_id) }}-${{ github.run_number }}
      SYSTEM_TYPE: ${{ inputs.system_type }}
      KERNEL_VERSION: ${{ inputs.kernel_version }}
      DESKTOP_ENV: ${{ inputs.desktop_environment || 'phosh-full' }}
    
    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
    
      # 安装debootstrap和7z
      - name: 安装构建工具
        run: |
          sudo apt update
          sudo apt install -y debootstrap
      
      # 验证参数
      - name: 验证构建参数
        run: |
          echo "构建配置:"
          echo "系统类型: ${{ env.SYSTEM_TYPE }}"
          echo "内核版本: ${{ env.KERNEL_VERSION }}"
          echo "桌面环境: ${{ env.DESKTOP_ENV }}"
          
          # 检查 Phosh 桌面版本是否提供了桌面环境参数（仅 ubuntu-desktop 需要）
          if [[ "${{ env.SYSTEM_TYPE }}" == "ubuntu-desktop" && -z "${{ inputs.desktop_environment }}" ]]; then
            echo "错误: ubuntu-desktop (Phosh) 版本必须指定桌面环境参数"
            exit 1
          fi
      
      # 从 GitHub Release 下载内核包
      - name: 下载内核编译产物
        id: download-kernel
        run: |
          # 从 Release 下载指定版本的内核包
          mkdir -p xiaomi-cepheus-debs_${{ env.KERNEL_VERSION }}
          
          echo "正在下载内核包 (版本: ${{ env.KERNEL_VERSION }})..."
          
          # 下载通用内核包
          curl -L -o xiaomi-cepheus-debs_${{ env.KERNEL_VERSION }}/linux-image-xiaomi-cepheus.deb \
            "https://github.com/${{ github.repository }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/linux-image-xiaomi-cepheus.deb" || echo "下载 linux-image-xiaomi-cepheus.deb 失败，可能 Release 不存在"
          
          curl -L -o xiaomi-cepheus-debs_${{ env.KERNEL_VERSION }}/linux-headers-xiaomi-cepheus.deb \
            "https://github.com/${{ github.repository }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/linux-headers-xiaomi-cepheus.deb" || echo "下载 linux-headers-xiaomi-cepheus.deb 失败，可能 Release 不存在"
          
          curl -L -o xiaomi-cepheus-debs_${{ env.KERNEL_VERSION }}/firmware-xiaomi-cepheus.deb \
            "https://github.com/${{ github.repository }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/firmware-xiaomi-cepheus.deb" || echo "下载 firmware-xiaomi-cepheus.deb 失败，可能 Release 不存在"
          
          # 桌面版本需要额外的alsa包
          if [[ "${{ env.SYSTEM_TYPE }}" != *"server"* ]]; then
            curl -L -o xiaomi-cepheus-debs_${{ env.KERNEL_VERSION }}/alsa-xiaomi-cepheus.deb \
              "https://github.com/${{ github.repository }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/alsa-xiaomi-cepheus.deb" || echo "下载 alsa-xiaomi-cepheus.deb 失败，可能 Release 不存在"
          fi
          
          # 检查是否下载成功
          echo "下载的内核包列表:"
          ls -la xiaomi-cepheus-debs_${{ env.KERNEL_VERSION }}/ || echo "目录为空"
          
          # 检查必要文件是否存在
          if [ ! -f "xiaomi-cepheus-debs_${{ env.KERNEL_VERSION }}/linux-image-xiaomi-cepheus.deb" ]; then
            echo "错误: 必要的内核包未下载成功"
            exit 1
          fi
          
          # 提取内核包中的实际内核版本
          KERNEL_PKG_VERSION=$(dpkg-deb -f xiaomi-cepheus-debs_${{ env.KERNEL_VERSION }}/linux-image-xiaomi-cepheus.deb Package | sed 's/linux-image-//')
          echo "提取的内核包版本: $KERNEL_PKG_VERSION"
          echo "kernel_pkg_version=$KERNEL_PKG_VERSION" >> $GITHUB_OUTPUT
      
      # 根据系统类型选择构建脚本
      - name: 构建系统镜像
        id: build-image
        run: |
          echo "开始构建 ${{ env.SYSTEM_TYPE }} 镜像..."
          
          # 统一调用模块化构建编排器 build.sh
          # 参数: <system_type> <kernel_version> [desktop_env]
          sudo bash build.sh "${{ env.SYSTEM_TYPE }}" "${{ env.KERNEL_VERSION }}" "${{ env.DESKTOP_ENV }}"
          
          echo "镜像构建完成!"
          
          # 获取rootfs.img的UUID
          if [ -f "rootfs.img" ]; then
            ROOTFS_UUID=$(sudo blkid -s UUID -o value rootfs.img)
            echo "rootfs.img UUID: $ROOTFS_UUID"
            echo "rootfs_uuid=$ROOTFS_UUID" >> $GITHUB_OUTPUT
          else
            echo "警告: rootfs.img 文件不存在"
            echo "rootfs_uuid=未知" >> $GITHUB_OUTPUT
          fi
      
      # 获取构建信息
      - name: 获取构建信息
        id: build-info
        run: |
          # 获取时间戳
          TIMESTAMP=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          
          # 获取系统版本信息
          case "${{ env.SYSTEM_TYPE }}" in
            "ubuntu-desktop"|"ubuntu-gnome"|"ubuntu-server")
              OS_NAME="Ubuntu"
              OS_VERSION="noble"
              ;;
          esac
          echo "os_name=$OS_NAME" >> $GITHUB_OUTPUT
          echo "os_version=$OS_VERSION" >> $GITHUB_OUTPUT
          
          # 确定系统类别（server 为服务器版，其余为桌面版）
          if [[ "${{ env.SYSTEM_TYPE }}" == *"server"* ]]; then
            SYSTEM_CATEGORY="Server"
          else
            SYSTEM_CATEGORY="Desktop"
          fi
          echo "system_category=$SYSTEM_CATEGORY" >> $GITHUB_OUTPUT
      
      # 生成Release标签和名称
      - name: 生成Release信息
        id: release-info
        run: |
          # 生成Release标签
          TAG="${{ env.SYSTEM_TYPE }}-v${{ env.KERNEL_VERSION }}"
          if [[ "${{ env.SYSTEM_TYPE }}" == "ubuntu-desktop" ]]; then
            TAG="${TAG}-${{ env.DESKTOP_ENV }}"
          fi
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          
          # 生成Release名称
          RELEASE_NAME="${{ steps.build-info.outputs.os_name }} ${{ steps.build-info.outputs.system_category }} 镜像 v${{ env.KERNEL_VERSION }}"
          if [[ "${{ env.SYSTEM_TYPE }}" == "ubuntu-desktop" ]]; then
            RELEASE_NAME="${RELEASE_NAME} (${{ env.DESKTOP_ENV }})"
          fi
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
      
      # 生成Release描述
      - name: 生成Release描述
        id: release-desc
        run: |
          # 构建描述内容
          DESCRIPTION="小米 Cepheus 设备 ${{ steps.build-info.outputs.os_name }} ${{ steps.build-info.outputs.system_category }} 镜像\n"
          DESCRIPTION="${DESCRIPTION}- 系统版本: ${{ steps.build-info.outputs.os_name }} ${{ steps.build-info.outputs.os_version }}\n"
          DESCRIPTION="${DESCRIPTION}- 内核版本: ${{ steps.download-kernel.outputs.kernel_pkg_version }}\n"
          DESCRIPTION="${DESCRIPTION}- 系统镜像UUID: ${{ steps.build-image.outputs.rootfs_uuid }}\n"
          
          if [[ "${{ env.SYSTEM_TYPE }}" == "ubuntu-desktop" ]]; then
            DESCRIPTION="${DESCRIPTION}- 桌面环境: ${{ env.DESKTOP_ENV }}\n"
          fi
          
          DESCRIPTION="${DESCRIPTION}- 构建时间: ${{ steps.build-info.outputs.timestamp }}\n"
          DESCRIPTION="${DESCRIPTION}- 构建 ID: ${{ env.BUILD_TIMESTAMP }}\n\n"
          
          # 添加特定说明
          if [[ "${{ env.SYSTEM_TYPE }}" == *"server"* ]]; then
            DESCRIPTION="${DESCRIPTION}说明：\n"
            DESCRIPTION="${DESCRIPTION}- 这是一个无图形界面的服务器版本\n"
            DESCRIPTION="${DESCRIPTION}- 包含基础网络管理工具\n"
            DESCRIPTION="${DESCRIPTION}- 已安装 SSH 服务器\n"
            DESCRIPTION="${DESCRIPTION}- 已安装中文语言支持\n"
            DESCRIPTION="${DESCRIPTION}- 包含必要的设备驱动和固件\n"
          else
            DESCRIPTION="${DESCRIPTION}说明：\n"
            DESCRIPTION="${DESCRIPTION}- 这是一个带有图形界面的桌面版本\n"
            DESCRIPTION="${DESCRIPTION}- 已安装 SSH 服务器\n"
            DESCRIPTION="${DESCRIPTION}- 已安装中文语言支持\n"
            DESCRIPTION="${DESCRIPTION}- 包含必要的设备驱动和固件\n"
          fi
          
          echo "description<<EOF" >> $GITHUB_OUTPUT
          echo -e "$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      # 创建 GitHub Release 并上传镜像
      - name: 创建 Release 并上传镜像
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-info.outputs.tag_name }}
          name: ${{ steps.release-info.outputs.release_name }}
          body: ${{ steps.release-desc.outputs.description }}
          draft: false
          prerelease: false
          files: |
            rootfs.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 上传镜像作为工作流制品
      - name: 上传镜像作为工作流制品
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SYSTEM_TYPE }}-image-v${{ env.KERNEL_VERSION }}
          path: |
            rootfs.7z
      
      # 清理临时文件
      - name: 清理临时文件
        if: always()
        run: |
          echo "清理临时文件..."
          sudo rm -f rootfs.img rootfs.7z 2>/dev/null || true
          sudo rm -rf rootdir 2>/dev/null || true
          rm -rf xiaomi-cepheus-debs_* 2>/dev/null || true