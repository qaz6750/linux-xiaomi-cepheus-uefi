# HiFi use case configuration for xiaomi cepheus.
# Author: XiaoYeZi <qaz6750@outlook.com>
#
# Playback Devices
#  - Internal Speaker    : CS35L41 Amp driver : MultiMedia1 <-> QUAT_MI2S_RX

SectionVerb {
	EnableSequence [
		# Speaker
		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia1' 1"
	]

	DisableSequence [
		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia1' 0"
	]

	Value {
		TQ "HiFi"
	}
}

SectionDevice."Speaker" {
	Comment "Internal Speaker"

	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:${CardId},0" # MultiMedia1
		PlaybackChannels 1
	}
}
