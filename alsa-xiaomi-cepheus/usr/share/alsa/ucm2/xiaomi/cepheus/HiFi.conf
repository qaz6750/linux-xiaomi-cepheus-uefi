# HiFi use case configuration for xiaomi cepheus.
# Author: XiaoYeZi <qaz6750@outlook.com>
#
# Playback Devices
#  - Internal Speaker    : CS35L41 Amp driver : MultiMedia2 <-> QUAT_MI2S_RX

SectionVerb {
	EnableSequence [
		# Speaker
		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia2' 1"
	]

	DisableSequence [
		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia2' 0"
	]

	Value {
		TQ "HiFi"
	}
}

SectionDevice."Speaker" {
	Comment "Internal Speaker"

	EnableSequence [
	]

	DisableSequence [
	]

	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:0,1"
	}
}
